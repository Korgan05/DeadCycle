# ⚡ Настройки системы маны (XP)
mana:
  # Начальный максимум маны для новых игроков
  initial_max: 100
  # Скорость регенерации рассчитывается автоматически: max_xp / 1000 в сек
  # Например: 100 мaks = 0.1 в сек, 200 макс = 0.2 в сек, 300 макс = 0.3 в сек
  # Насколько увеличивается максимум маны при каждом использовании скилла
  max_increase_per_use: 0.5
  # Какой процент прогресса текущей игры переносится после полного ресета.
  # Перенос теперь аддитивный между играми:
  # carry_bonus_next = carry_bonus_now + (max_текущей_игры - старт_этой_игры) * reset_carryover_percent
  # новый старт = initial_max + carry_bonus_next
  reset_carryover_percent: 0.10

# ⭐ Особые скиллы (не привязаны к китам)
special_skills:
  # Кулдаун антиспама сообщения о нулевой мане (в миллисекундах)
  out_of_mana_message_cooldown_ms: 2500

  regen_item:
    # Сколько урона нужно получить для получения предмета
    damage_taken_to_unlock: 1000
    # Сколько маны тратится в секунду при регенерации
    mana_per_second: 1.0
    # Сила эффекта регенерации (0=I, 1=II, 2=III...)
    potion_amplifier: 1

  auto_regen:
    # Сколько нужно вылечить здоровья с предметом регенерации
    heal_to_unlock: 500
    # Сколько маны тратится в секунду при авторегене
    mana_per_second: 0.5
    # Сила пассивной регенерации (0=I, 1=II...)
    potion_amplifier: 0

  auto_dodge:
    # Условия получения
    damage_taken: 100
    damage_dealt: 100
    # Шанс уклонения (0.25 = 25%)
    dodge_chance: 0.25
    # Стоимость маны за успешное уклонение
    mana_cost: 5

# 🤖 Мобильность босса в дуэли
boss:
  mobility:
    # Кд между рывками босса (в тиках)
    dash_cooldown_ticks: 60
    # Задержка-телеграф перед рывком (в тиках)
    dash_windup_ticks: 8
    # Скорость скользящего рывка по земле
    dash_speed: 1.3

    # Скольжение при уклонении босса
    dodge_speed_min: 0.9
    dodge_speed_max: 1.4

    # Скольжение при отступе босса
    backstep_speed_min: 0.8
    backstep_speed_max: 1.2

  # Контр-игра босса против призывателя/петов
  summoner_counter:
    # Насколько босс режет урон по призванным существам/клонам
    mob_damage_multiplier: 0.55
    # Параметры ударной волны при адаптации к призывателю
    shockwave_radius: 6.5
    shockwave_power: 1.0
    shockwave_tier_bonus: 0.18
    shockwave_upward: 0.24
    shockwave_upward_tier_bonus: 0.03

# 🎴 Админские аниме-силы (Годжо/Сукуна)
anime_powers:
  # true = использовать только OP / deadcycle.admin
  admin_only: true

  # Прокачка силы
  max_level: 10
