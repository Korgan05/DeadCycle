phase:
  day_seconds: 600
  night_seconds: 300

economy:
  start_money: 0
  kill_zombie_reward: 5

  # Ограничение фарма денег с обычных зомби (0 = без лимита)
  kill_reward_cap:
    window_seconds: 60
    max_reward_in_window: 0

  # Опыт за съедание гнилой плоти (выпадает с зомби)
  rotten_flesh_xp: 5

# --- death rules ---
death:
  # сохранять инвентарь при смерти
  keep_inventory: true

  # но ресурсы (камень/уголь/железо/золото/алмазы) удалять при смерти
  remove_resources: true

difficulty:
  zombie_hp_base: 16.0
  zombie_hp_per_day: 1.2
  zombie_dmg_base: 2.0
  zombie_dmg_per_day: 0.2

zombies:
  enabled: true
  base_per_player: 2
  per_night_add: 1
  # Базовая скорость обычного зомби (остальные типы масштабируются от неё)
  base_speed: 0.23

  # ✅ когда наступает день — удаляем зомби
  despawn_at_day: true

  # true = удалить всех зомби в мире базы; false = удалить только "наших" (deadcycle_zombie)
  despawn_all_at_day: true

  base_spawn_ring:
    min_outside: 10
    max_outside: 28

  spawn_radius_min: 12
  spawn_radius_max: 28
  spawn_y_offset: 2

  follow_range: 48.0
  target_scan_seconds: 2

  # Типы зомби для разнообразия волн
  # Механика выбора: обычный и спец-типы выбираются по весам (weight),
  # а спец-типы начинают выпадать только с min_day.
  types:
    normal:
      enabled: true
      min_day: 1
      weight: 70
      hp_mult: 1.0
      damage_mult: 1.0
      speed_mult: 1.0
      follow_mult: 1.0
      siege_damage_mult: 1.0

    runner:
      enabled: true
      min_day: 2
      weight: 16
      hp_mult: 0.72
      damage_mult: 0.85
      speed_mult: 1.34
      follow_mult: 1.08
      siege_damage_mult: 1.0

    brute:
      enabled: true
      min_day: 4
      weight: 10
      hp_mult: 2.15
      damage_mult: 1.45
      speed_mult: 0.82
      follow_mult: 0.95
      siege_damage_mult: 1.0

    screamer:
      enabled: true
      min_day: 5
      weight: 7
      hp_mult: 0.95
      damage_mult: 1.0
      speed_mult: 1.0
      follow_mult: 1.15
      siege_damage_mult: 1.0
      aura:
        radius: 7.5
        # 0 = Speed I / Strength I
        speed_amp: 0
        strength_amp: 0
        cooldown_ticks: 80
        duration_ticks: 60

    necromancer:
      enabled: true
      min_day: 6
      weight: 5
      hp_mult: 1.1
      damage_mult: 0.92
      speed_mult: 0.96
      follow_mult: 1.2
      siege_damage_mult: 1.0
      summon:
        cooldown_ticks: 140
        count: 2
        radius: 5.5
        hp_mult: 0.62
        damage_mult: 0.76
        speed_mult: 1.02

    sapper:
      enabled: true
      min_day: 7
      weight: 8
      hp_mult: 1.35
      damage_mult: 0.95
      speed_mult: 0.92
      follow_mult: 1.0
      # Главная роль сапёра: быстрее ломать базу
      siege_damage_mult: 2.4

mini_boss:
  enabled: true
  # Ночь, в которую появляются мини-боссы (по одному на каждого игрока)
  spawn_day: 5

  # Базовые статы мини-босса (он должен быть проблемным, но слабее главного босса)
  hp: 72.0
  damage: 3.8
  speed: 0.26
  follow_range: 38.0

  # Как часто мини-босс может копировать использованный игроком скилл
  copy_cooldown_ms: 2200

  # Дистанция спавна вокруг игрока
  spawn_radius_min: 5
  spawn_radius_max: 10

cloner:
  enabled: true

  # Лимиты активных клонов по уровням (l10: -1 = безлимит)
  max_clones_by_level:
    l1: 3
    l2: 5
    l3: 7
    l4: 9
    l5: 11
    l6: 13
    l7: 15
    l8: 17
    l9: 18
    l10: -1

  # Содержание лишних клонов за ману владельца
  upkeep:
    enabled: false
    mana_per_extra_clone_per_second: 0.0
    # -1 = бесплатно для любого количества
    free_clones: -1
    warn_cooldown_ms: 5000

  # Базовые статы клонов
  hp_base: 22.0
  hp_per_level: 1.2
  damage_base: 2.8
  damage_per_level: 0.35
  speed_base: 0.26
  speed_per_level: 0.01
  follow_range: 34.0

  # Поведение ИИ
  protect_radius: 16.0
  attack_radius: 28.0
  leash_owner_distance: 14
  leash_base_distance: 18

  # Где появится клон относительно игрока
  spawn_radius_min: 1
  spawn_radius_max: 4

  # Если зомби умер вскоре после удара клона, засчитываем килл клону
  clone_hit_credit_ms: 5000

  # Мана клонов (клоны тратят её на само-лечение и уклонение)
  mana_base: 55
  mana_per_level: 4
  mana_regen_per_second: 0.35

  # Авто-лечение клонов (если у владельца открыт реген/автореген)
  self_heal_trigger_health_ratio: 0.92
  self_heal_mana_per_second: 1.0
  self_heal_amplifier: 1

  # Авто-уклонение клонов (если у владельца открыт авто-додж)
  dodge_chance: 0.25
  dodge_mana_cost: 5
  dodge_cooldown_ms: 850

  # Блуждание в режиме "Атака" (клоны не следуют за владельцем)
  attack_roam_radius_min: 6
  attack_roam_radius_max: 14

summoner:
  enabled: true

  # Радиус поиска врагов призванными существами
  target_search_radius: 32.0

  # Радиус призыва относительно игрока
  spawn_radius_min: 2
  spawn_radius_max: 8

  # Если зомби умер вскоре после удара призванного существа — засчитываем килл
  summon_hit_credit_ms: 5000

  # Длительность жизни призывов (сек)
  duration_seconds:
    wolf: 55
    phantom: 50
    golem: 65
    vex: 45

  # Лимиты активных призывов по типам
  max_active:
    wolf: 10
    phantom: 4
    golem: 2
    vex: 6

  # Содержание лишних призывов за ману владельца
  upkeep:
    enabled: false
    mana_per_extra_summon_per_second: 0.0
    # -1 = бесплатно для любого количества
    free_summons: -1
    warn_cooldown_ms: 5000

  # Пассивка 10 уровня: варден перед смертью
  death_warden:
    duration_seconds: 30
    hp: 180.0
    damage: 18.0

  # Базовые статы призывов
  stats:
    wolf:
      hp: 24.0
      damage: 4.5
      speed: 0.34
    phantom:
      hp: 26.0
      damage: 5.5
      speed: 0.30
    golem:
      hp: 90.0
      damage: 11.0
      speed: 0.24
    vex:
      hp: 20.0
      damage: 4.0
      speed: 0.40

base:
  enabled: true
  world: world
  x: 0
  y: 64
  z: 0
  radius: 30
  spawn_y_offset: 1

  # ✅ текущий уровень стен базы (1..wall_upgrade.max_level)
  wall_level: 1

shop:
  buy:
    # Подсказка: ЛКМ — купить, Shift+ЛКМ — купить x4

    # --- бой ---
    STONE_SWORD: 25
    IRON_SWORD: 120
    SHIELD: 80
    BOW: 150
    ARROW_16: 25

    # --- броня ---
    LEATHER_HELMET: 25
    LEATHER_CHESTPLATE: 45
    LEATHER_LEGGINGS: 40
    LEATHER_BOOTS: 25

    IRON_HELMET: 160
    IRON_CHESTPLATE: 250
    IRON_LEGGINGS: 220
    IRON_BOOTS: 140

    # --- инструменты ---
    IRON_PICKAXE: 180
    IRON_AXE: 140
    IRON_SHOVEL: 60
    SHEARS: 45
    TORCH_16: 20

    # --- еда ---
    BREAD_16: 22
    COOKED_BEEF_16: 35
    GOLDEN_APPLE: 180

    # --- особое ---
    POTION_HEALING: 220
    ENDER_PEARL_4: 120
    BASE_SCROLL: 800

# ---- осада ----
siege:
  enabled: true
  only_at_night: true
  start_day: 3
  extra_radius: 8
  tick_interval: 10
  block_damage_base: 2
  block_damage_per_day: 0.3
  break_no_drops: true
  whitelist_only: true

# Сколько HP у блоков базы (то, что не указано — не ломается зомби)
blocks_hp:
  OAK_PLANKS: 30
  SPRUCE_PLANKS: 45
  BIRCH_PLANKS: 30
  JUNGLE_PLANKS: 30
  ACACIA_PLANKS: 30
  DARK_OAK_PLANKS: 30
  MANGROVE_PLANKS: 30
  CHERRY_PLANKS: 30

  COBBLESTONE: 60
  STONE: 90
  STONE_BRICKS: 120
  BRICKS: 70

  OAK_FENCE: 20
  OAK_DOOR: 18

# --- builder ---
builder:
  repair_amount: 8

repair_gui:
  inv_title: "Ремонт базы"
  tick_period_ticks: 20

repair_cost:
  points_per_tick: 10

  # ✅ стоимость ремонта зависит от уровня стен (приоритетнее points_per_tick)
  points_per_tick_by_wall_level:
    l1: 10
    l2: 12
    l3: 16
    l4: 22
    l5: 30

# --- mining regen + miner leveling ---
regen_mining:
  enabled: true
  restore_seconds: 90
  only_outside_base: true

miner_progress:
  enabled: true
  exp_per_block: 2
  level_xp_base: 80
  level_xp_add_per_level: 40
  max_level: 10
  haste_max_level: 4

kit_xp:
  fighter:
    exp_per_zombie: 2
    level_xp_base: 60
    level_xp_add_per_level: 35
    max_level: 10

  berserk:
    exp_per_zombie: 2
    level_xp_base: 70
    level_xp_add_per_level: 45
    max_level: 10

  builder:
    exp_per_repair_tick: 1
    exp_per_wall_block_upgrade: 1
    level_xp_base: 70
    level_xp_add_per_level: 45
    max_level: 10

  archer:
    # Лучник получает XP от убийства зомби (как Fighter и Berserk)
    exp_per_zombie: 2
    level_xp_base: 65
    level_xp_add_per_level: 40
    max_level: 10

  gravitator:
    # Гравитатор получает XP от убийства зомби
    exp_per_zombie: 2
    level_xp_base: 70
    level_xp_add_per_level: 45
    max_level: 10

  duelist:
    # Ритуалист получает XP в активном бою
    exp_per_zombie: 1
    exp_per_hit: 1
    level_xp_base: 75
    level_xp_add_per_level: 50
    max_level: 10

  cloner:
    # Клонер получает XP за свои убийства
    exp_per_zombie: 1
    # И отдельно за убийства, которые сделал клон
    exp_per_clone_kill_zombie: 2
    level_xp_base: 70
    level_xp_add_per_level: 42
    max_level: 10

  summoner:
    # Призыватель получает XP за свои убийства
    exp_per_zombie: 1
    # И отдельно за убийства, сделанные призванными существами
    exp_per_summon_kill_zombie: 2
    level_xp_base: 72
    level_xp_add_per_level: 44
    max_level: 10

# --- общий уровень игрока (мета-прогресс) ---
player_progress:
  max_level: 50
  level_xp_base: 60
  level_xp_add_per_level: 35

  # Награды опыта за убийства
  kill_exp:
    zombie: 2
    mini_boss: 12
    boss: 30

# --- kit buffs (баланс кита) ---
kit_buffs:
  fighter:
    enabled: true

    # Health Boost: lvl2-4 -> I, lvl5-7 -> II, lvl8-10 -> III (по умолчанию)
    health_boost_start_level: 2
    health_boost_every_levels: 3
    health_boost_max_level: 3

    # Strength: lvl6+ -> I, lvl10 -> II (по умолчанию)
    strength_level_1_start: 6
    strength_level_2_start: 10

  berserk:
    enabled: true

    # "На грани жизни" (для 2 уровня) — порог в сердцах
    life_threshold_hearts: 3.0
    # "На грани смерти" (для 3+ уровней) — порог в сердцах
    death_threshold_hearts: 2.0

    # Кулдаун между срабатываниями (сек)
    proc_cooldown_seconds: 75

    # Рёв на 5 уровне
    roar_radius: 5
    roar_fear_seconds: 5

    # Партиклы при срабатывании берсерка (отдельная анимация по уровню)
    particles:
      enabled: true
      # Proc-партиклы работают пока активны бафы (сила/сопротивление),
      # но на всякий случай есть лимит по времени.
      max_ticks: 1200
      period: 4
      proc_burst_ticks: 40
      roar_enabled: true
      # Если 0 — шаги волны считаются от радиуса (плавнее).
      roar_steps: 0
      roar_period: 1

  duelist:
    enabled: true

    # Радиус, в котором считается давление толпы
    crowd_radius: 8.5

    # Бонус урона в 1v1
    one_vs_one_damage_bonus_base: 0.10
    one_vs_one_damage_bonus_per_level: 0.018
    one_vs_one_damage_bonus_cap: 0.38

    # Штраф урона в толпе
    crowd_damage_penalty_per_enemy: 0.08
    crowd_damage_penalty_cap: 0.35

    # Вампиризм в 1v1
    one_vs_one_lifesteal_base: 0.04
    one_vs_one_lifesteal_per_level: 0.003
    one_vs_one_lifesteal_cap: 0.10

    # Снижение входящего урона в 1v1
    one_vs_one_reduction_base: 0.07
    one_vs_one_reduction_per_level: 0.014
    one_vs_one_reduction_cap: 0.32

    # Насколько быстро падает защита в толпе
    crowd_reduction_decay_per_enemy: 0.20

    # Кулдаун начисления XP за попадания
    hit_xp_cooldown_ms: 1000

# --- base resources ---
base_resources:
  money_per_point: 0.5
  points: 0
  by_type:
    stone: 0
    coal: 0
    iron: 0
    diamond: 0

# --- wall upgrade (builder) ---
wall_upgrade:
  enabled: true
  max_level: 5

  # ✅ материалы по уровням
  levels:
    l1: OAK_PLANKS
    l2: SPRUCE_PLANKS
    l3: COBBLESTONE
    l4: STONE
    l5: STONE_BRICKS

  # ✅ скорость апгрейда
  tick_period_ticks: 20
  blocks_per_tick_base: 1
  blocks_per_tick_per_builder_level: 1

  # ✅ цена за 1 блок (в очках базы)
  points_per_block: 15

  # ✅ цена за 1 блок по уровню (приоритетнее points_per_block)
  # l2 = апгрейд на 2 уровень, l3 = на 3, и т.д.
  points_per_block_by_level:
    l2: 15
    l3: 25
    l4: 40
    l5: 60

  # ✅ скан по Y относительно центра базы (чтобы не апгрейдить всё подряд по миру)
  scan_y_min_offset: -5
  scan_y_max_offset: 15

# ===== SKILLS (система скиллов для китов) =====
skills:
  archer:
    rain:
      # 🏹 Ливень стрел - спавнятся стрелы сверху в направлении взгляда
      # Стоимость в уровнях опыта (levels)
      xp_cost: 5
      # Кулдаун в миллисекундах (30000 = 30 сек)
      cooldown_ms: 30000
      # Базовое количество стрел
      arrow_count: 10
      # Дополнительно стрел за каждый уровень лучника
      arrows_per_level: 5
      # Радиус спавна стрел (в блоках вокруг центра)
      radius: 10.0
      # Высота, с которой падают стрелы (в блоках выше центра спавна)
      spawn_height: 15.0
      # Расстояние впереди игрока где будет центр спавна (куда смотрит игрок)
      distance_ahead: 15.0
      # Показывать preview визуализацию радиуса белыми партиклами
      show_preview: true

  gravitator:
    crush:
      # 🧲 Гравитационный пресс - прижимает зомби к земле
      # Стоимость в опыте (XP)
      xp_cost: 25
      # Стоимость в HP (если опыта не хватило)
      hp_cost: 4.0
      # Кулдаун в миллисекундах (30000 = 30 сек)
      cooldown_ms: 30000
      # Радиус поражения
      radius_base: 6.0
      radius_per_level: 0.4
      # Длительность эффекта (тики)
      duration_ticks: 80
      # Урон по зомби каждую секунду
      damage_per_tick_base: 2.0
      damage_per_level: 0.4
      # Сила замедления для зомби и игрока
      zombie_slow_amplifier: 10
      player_slow_amplifier: 2

    levitation:
      # 💜 Антигравитация - отправляет зомби вверх
      # Стоимость в опыте (XP)
      xp_cost: 20
      # Стоимость в HP (если опыта не хватило)
      hp_cost: 2.0
      # Кулдаун в миллисекундах (20000 = 20 сек)
      cooldown_ms: 20000
      # Радиус поражения
      radius_base: 8.0
      radius_per_level: 0.5
      # Сила, с которой зомби летят вверх
      upward_force: 1.5
      # Урон по зомби
      damage_base: 3.0
      damage_per_level: 0.5
      # Параметры эффекта левитации
      levitation_amplifier: 2
      levitation_duration_ticks: 60

  duelist:
    ritual_cut:
      # 🩸 Ритуальный Разрез — сильный фокус по основной цели
      xp_cost: 18
      cooldown_ms: 14000
      range: 16.0
      crowd_radius: 8.5
      damage_base: 6.0
      damage_per_level: 0.55
      one_vs_one_bonus_base: 0.20
      one_vs_one_bonus_per_level: 0.015
      crowd_penalty_per_enemy: 0.16
      crowd_penalty_cap: 0.45
      weaken_seconds_base: 5
      weaken_seconds_per_level: 1
      weaken_amplifier_base: 0
      slow_seconds: 4
      slow_amplifier: 1
      self_slow_on_crowd_ticks: 24

    circle_trance:
      # 🔮 Транс Круга — ритуальная стойка под фокус-цель
      xp_cost: 14
      cooldown_ms: 18000
      duration_seconds_base: 5
      duration_seconds_per_level: 1
      crowd_radius: 9.0
      resistance_amplifier_base: 0
      resistance_amplifier_level7: 1
      speed_amplifier_base: 0
      regen_amplifier_base: 0
      mark_weakness_seconds: 4
      mark_weakness_amplifier: 0
      crowd_duration_multiplier: 0.72
      crowd_resist_decay_per_enemy: 0.25

  cloner:
    summon:
      # 🧬 Призыв клона
      xp_cost: 50
      cooldown_ms: 3000
      cooldown_reduce_per_level_ms: 120
      cooldown_min_ms: 1000

    mode:
      # 🔁 Переключение режима ИИ клонов
      cooldown_ms: 700

  summoner:
    wolf:
      # 🐺 Призыв волков
      xp_cost: 24
      cooldown_ms: 2400
      cooldown_reduce_per_level_ms: 80
      cooldown_min_ms: 1200

    phantom:
      # 👻 Призыв фантома (с 3 уровня)
      xp_cost: 34
      cooldown_ms: 5200
      cooldown_reduce_per_level_ms: 120
      cooldown_min_ms: 2600

    golem:
      # 🛡 Призыв железного голема (с 4 уровня)
      xp_cost: 52
      cooldown_ms: 8200
      cooldown_reduce_per_level_ms: 140
      cooldown_min_ms: 4200

    vex:
      # 🧿 Призыв духов-вексов (с 7 уровня)
      xp_cost: 40
      cooldown_ms: 6400
      cooldown_reduce_per_level_ms: 130
      cooldown_min_ms: 3000

# ⚡ Настройки системы маны (XP)
mana:
  # Начальный максимум маны для новых игроков
  initial_max: 100
  # Скорость регенерации рассчитывается автоматически: max_xp / 1000 в сек
  # Например: 100 мaks = 0.1 в сек, 200 макс = 0.2 в сек, 300 макс = 0.3 в сек
  # Насколько увеличивается максимум маны при каждом использовании скилла
  max_increase_per_use: 0.5
  # Какой процент от набранного сверх базового максимума переносится после полного ресета
  # Формула: новый старт = initial_max + (max_за_прошлую_игру - initial_max) * reset_carryover_percent
  reset_carryover_percent: 0.10

# ⭐ Особые скиллы (не привязаны к китам)
special_skills:
  # Кулдаун антиспама сообщения о нулевой мане (в миллисекундах)
  out_of_mana_message_cooldown_ms: 2500

  regen_item:
    # Сколько урона нужно получить для получения предмета
    damage_taken_to_unlock: 1000
    # Сколько маны тратится в секунду при регенерации
    mana_per_second: 1.0
    # Сила эффекта регенерации (0=I, 1=II, 2=III...)
    potion_amplifier: 1

  auto_regen:
    # Сколько нужно вылечить здоровья с предметом регенерации
    heal_to_unlock: 500
    # Сколько маны тратится в секунду при авторегене
    mana_per_second: 0.5
    # Сила пассивной регенерации (0=I, 1=II...)
    potion_amplifier: 0

  auto_dodge:
    # Условия получения
    damage_taken: 100
    damage_dealt: 100
    # Шанс уклонения (0.25 = 25%)
    dodge_chance: 0.25
    # Стоимость маны за успешное уклонение
    mana_cost: 5

# 🤖 Мобильность босса в дуэли
boss:
  mobility:
    # Кд между рывками босса (в тиках)
    dash_cooldown_ticks: 60
    # Задержка-телеграф перед рывком (в тиках)
    dash_windup_ticks: 8
    # Скорость скользящего рывка по земле
    dash_speed: 1.3

    # Скольжение при уклонении босса
    dodge_speed_min: 0.9
    dodge_speed_max: 1.4

    # Скольжение при отступе босса
    backstep_speed_min: 0.8
    backstep_speed_max: 1.2

# 🎴 Админские аниме-силы (Годжо/Сукуна)
anime_powers:
  # true = использовать только OP / deadcycle.admin
  admin_only: true

  # Прокачка силы
  max_level: 10
  level_xp_base: 35
  level_xp_add_per_level: 25

  gojo:
    # Бесконечность: стоимость блокировки урона
    infinity_base_mana: 2
    infinity_mana_per_damage: 1.35

