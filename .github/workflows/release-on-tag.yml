name: Release JAR on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B -DskipTests package

      - name: Prepare release asset
        id: prepare_asset
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          JAR_PATH="$(find target -maxdepth 1 -type f -name '*.jar' \
            ! -name '*-sources.jar' \
            ! -name '*-javadoc.jar' \
            ! -name '*-tests.jar' \
            ! -name 'original-*.jar' | head -n 1)"

          if [ -z "$JAR_PATH" ]; then
            echo "JAR file not found in target/."
            exit 1
          fi

          ASSET_NAME="DeadCycle-${TAG}.jar"
          cp "$JAR_PATH" "$ASSET_NAME"
          echo "asset=$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Create or update Release with JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ steps.prepare_asset.outputs.asset }}
          generate_release_notes: true
