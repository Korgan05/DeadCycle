name: Backfill Releases (All Tags)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and upload JAR for each tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          TAGS=$(git tag -l 'v*' --sort=v:refname)

          if [ -z "$TAGS" ]; then
            echo "No version tags found."
            exit 0
          fi

          for tag in $TAGS; do
            echo "=== Processing $tag ==="

            git checkout "$tag"
            mvn -B -DskipTests clean package

            JAR_PATH="$(find target -maxdepth 1 -type f -name '*.jar' \
              ! -name '*-sources.jar' \
              ! -name '*-javadoc.jar' \
              ! -name '*-tests.jar' \
              ! -name 'original-*.jar' | head -n 1)"

            if [ -z "$JAR_PATH" ]; then
              echo "No JAR produced for $tag, skipping."
              continue
            fi

            ASSET_NAME="DeadCycle-${tag}.jar"
            cp "$JAR_PATH" "$ASSET_NAME"

            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag exists, uploading/replacing asset."
              gh release upload "$tag" "$ASSET_NAME" --clobber
            else
              echo "Creating release $tag and uploading asset."
              gh release create "$tag" "$ASSET_NAME" \
                --title "$tag" \
                --notes "Автоматически собранный JAR для $tag"
            fi

            rm -f "$ASSET_NAME"
          done

          git checkout "$GITHUB_SHA"
